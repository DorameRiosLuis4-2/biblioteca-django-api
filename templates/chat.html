<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat General - Biblioteca UTH</title>
    <style>
        #chat-container { width: 400px; margin: 20px auto; font-family: sans-serif; }
        #chat-messages { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        #chat-input { width: 80%; padding: 10px; }
        #send-btn { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <h2>💬 Chat General</h2>
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
        <button id="send-btn">Enviar</button>
    </div>

    <script>
        // Conectar al WebSocket
        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/ws/chat/general/'
        );

        chatSocket.onopen = function(e) {
            console.log('✅ WebSocket conectado');
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            console.log('Mensaje recibido:', data);
            
            // Mostrar mensaje en el chat
            if (data.type === 'message' || data.message) {
                addMessage(data.username || 'Sistema', data.message);
            }
        };

        chatSocket.onclose = function(e) {
            console.error('❌ WebSocket cerrado');
        };

        // Lógica para el botón de enviar
        document.getElementById('send-btn').onclick = function() {
            const input = document.getElementById('chat-input');
            const message = input.value;
            if (message) {
                chatSocket.send(JSON.stringify({
                    'message': message,
                    'username': 'Usuario' // Aquí podrías poner el nombre real
                }));
                input.value = '';
            }
        };

        function addMessage(username, message) {
            const messagesDiv = document.getElementById('chat-messages');
            messagesDiv.innerHTML += `<p><strong>${username}:</strong> ${message}</p>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll al final
        }
    </script>
</body>
</html>
