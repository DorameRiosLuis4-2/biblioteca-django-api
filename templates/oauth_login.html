<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login con Google - Biblioteca UTH</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            color: #666;
            font-size: 1.2em;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .user-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .token-display {
            background: #2d2d2d;
            color: #4ec9b0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login con Google</h1>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Procesando autenticación...</p>
        </div>
        
        <div id="result" class="result"></div>
    </div>
    
    <script>
        // 1. Leer TODOS los parámetros que envió el backend de Django
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get('access_token');
        const refreshToken = urlParams.get('refresh_token');
        const userInfoRaw = urlParams.get('user_info');
        const googleInfoRaw = urlParams.get('google_info');
        const messageStr = urlParams.get('message');
        const error = urlParams.get('error');
        
        if (error) {
            showError('Login cancelado o error: ' + error);
        } else if (accessToken && userInfoRaw) {
            // 2. ¡El backend ya hizo el trabajo! Guardamos los tokens directamente
            localStorage.setItem('access_token', accessToken);
            localStorage.setItem('refresh_token', refreshToken);
            
            try {
                // 3. Convertimos los textos JSON de la URL en objetos de JavaScript
                const userObj = JSON.parse(decodeURIComponent(userInfoRaw));
                const googleObj = googleInfoRaw ? JSON.parse(decodeURIComponent(googleInfoRaw)) : {};
                
                // 4. Preparamos la data para que coincida con lo que espera tu función showSuccess
                const data = {
                    message: messageStr ? decodeURIComponent(messageStr) : 'Autenticación Exitosa',
                    user: userObj,
                    google_data: googleObj,
                    access: accessToken
                };
                
                // 5. Mostramos la pantalla verde
                showSuccess(data);
                
                // (Opcional) Limpiar la URL para que no se vean los tokens enormes arriba
                window.history.replaceState({}, document.title, window.location.pathname);
                
            } catch (e) {
                console.error(e);
                showError('Error al decodificar la información del usuario.');
            }
        } else {
            // 6. Solo si entras a esta página de cero, te manda a Google a iniciar sesión
            window.location.href = '/api/auth/google/redirect/';
        }
        
        function showSuccess(data) {
            document.getElementById('loading').style.display = 'none';
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result success';
            resultDiv.style.display = 'block';
            
            resultDiv.innerHTML = `
                <h2>✅ ${data.message}</h2>
                
                <div class="user-info">
                    <h3>👤 Datos del Usuario</h3>
                    <p><strong>Email:</strong> ${data.user.email}</p>
                    <p><strong>Nombre:</strong> ${data.user.first_name} ${data.user.last_name}</p>
                    <p><strong>Username:</strong> ${data.user.username}</p>
                    ${data.google_data.picture ? `<img src="${data.google_data.picture}" alt="Foto de perfil" style="border-radius:50%;margin-top:10px;width:80px;height:80px;">` : ''}
                </div>
                
                <div class="token-display">
                    <strong>🔑 Access Token (JWT):</strong><br>
                    ${data.access.substring(0, 50)}...
                </div>
                
                <a href="/api/" class="btn">📚 Ir a la API</a>
                <a href="/" class="btn">🏠 Volver al Inicio</a>
            `;
        }
        
        function showError(errorMessage) {
            document.getElementById('loading').style.display = 'none';
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result error';
            resultDiv.style.display = 'block';
            
            resultDiv.innerHTML = `
                <h2>❌ Error en el Login</h2>
                <p>${errorMessage}</p>
                <a href="/" class="btn">🏠 Volver al Inicio</a>
            `;
        }
    </script>
</body>
</html>
